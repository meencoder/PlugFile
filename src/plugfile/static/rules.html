<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e3a5f">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
  <title>Plugfile — Rules Monitor</title>
</head>
<body>

<header>
  <div class="logo"><svg class="logo-mark" viewBox="0 0 150 150" aria-hidden="true"><rect x="18" y="20" width="114" height="116" fill="none" stroke="#F4F1EA" stroke-width="7" rx="13"/><rect x="28" y="32" width="94" height="9" fill="#FCD34D" rx="3"/><rect x="30" y="50" width="92" height="14" fill="#F4F1EA" rx="5"/><rect x="38" y="70" width="76" height="14" fill="#F4F1EA" rx="5"/><rect x="46" y="90" width="58" height="14" fill="#F4F1EA" rx="5"/><rect x="46" y="110" width="58" height="14" fill="#D97706" rx="5"/></svg><span class="logo-word">Plugfile</span> <span class="logo-sub">Rules</span></div>
  <div id="auth-bar" class="auth-bar hidden"></div>
</header>

<main>
  <h2>RRC Rules Monitor</h2>
  <p class="hint">Tracks changes to RRC rules and forms (TAC §3.14, the forms library, GAU, the online system). The scheduled job does the heavy diffing and suggestions; this is a read-only view of the latest snapshot. Admin / signed-in only.</p>

  <button id="rules-refresh" class="btn-ghost" type="button">↻ Refresh</button>

  <div id="rules-body" style="margin-top:14px"></div>

  <div style="margin-top:24px">
    <a class="btn-ghost" href="/app">← W-3 wizard</a>
    <a class="btn-ghost" href="/w3a">W-3A wizard</a>
  </div>
</main>

<script src="/static/auth.js"></script>
<script src="/static/rules.js"></script>
</body>
</html>
