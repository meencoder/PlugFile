[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-chassis"
version = "0.1.0"
description = "Shared agent kernel: model-provider abstraction, structured-extraction tool loop, JSON helpers. Domain-free — consumed by plugfile and familyops."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Kareem" }]
license = { text = "MIT" }
# Intentionally dependency-light. Provider SDKs (anthropic, google-genai) are
# OPTIONAL extras and imported lazily so the kernel itself stays portable.
dependencies = []

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
gemini = ["google-genai>=0.3"]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/agent_chassis"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
