<svg viewBox="0 0 520 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caprock logo">
  <title>Caprock</title>
  <desc>A circular mark showing a stylized wellbore cross-section with stratified geological layers (caprock) and three amber cement plugs sealing the wellbore, paired with a wordmark.</desc>

  <!-- Mark: circular badge -->
  <g transform="translate(75, 75)">
    <!-- Charcoal disk = formation -->
    <circle cx="0" cy="0" r="60" fill="#1F2937"/>

    <!-- Strata lines (caprock layers) -->
    <g stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round">
      <line x1="-44" y1="-34" x2="44" y2="-34"/>
      <line x1="-48" y1="-26" x2="48" y2="-26"/>
      <line x1="-48" y1="26" x2="48" y2="26"/>
      <line x1="-44" y1="34" x2="44" y2="34"/>
    </g>

    <!-- Wellbore channel (slightly darker than disk) -->
    <rect x="-10" y="-50" width="20" height="100" fill="#0F172A"/>

    <!-- Casing walls -->
    <g stroke="#E5E7EB" stroke-width="1">
      <line x1="-10" y1="-50" x2="-10" y2="50"/>
      <line x1="10" y1="-50" x2="10" y2="50"/>
    </g>

    <!-- Three cement plugs in amber/caliche -->
    <rect x="-10" y="-36" width="20" height="10" fill="#D97706" rx="1"/>
    <rect x="-10" y="-5"  width="20" height="10" fill="#D97706" rx="1"/>
    <rect x="-10" y="26"  width="20" height="10" fill="#D97706" rx="1"/>

    <!-- Steel surface plate cap -->
    <rect x="-15" y="-54" width="30" height="5" fill="#FCD34D" rx="1"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="86"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="52" font-weight="700" fill="#1F2937" letter-spacing="-1.5">Caprock</text>

  <!-- Tagline -->
  <text x="161" y="112"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#6B7280" letter-spacing="3.5">
    W-3 COMPLIANCE, AUTOMATED
  </text>
</svg>
