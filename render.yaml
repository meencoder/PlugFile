services:
  - type: web
    name: plugfile-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -e ".[web]"
    startCommand: uvicorn plugfile.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLUGFILE_RRC_LIVE
        value: "false"          # set to "true" once RRC live fetch is validated
      - key: PYTHON_VERSION
        value: "3.11"
